title: LegionForge
tagline: Sovereign AI for Everyone!
description: >-
  Built local-first, security-native, owned by you. Open-source software
  that gives you AI without giving up your sovereignty.
url: https://legionforge.org
author: JP Cruz

# Disable default Jekyll theme — using custom layouts
theme: null

# Disable the Markdown processor's smart quotes (terminal aesthetic prefers straight quotes)
markdown: kramdown
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]

# Build settings
permalink: pretty
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

# Site-wide data accessible in templates
products:
  - id: framework
    name: LegionForge Framework
    short: framework
    tagline: Local-first AI agent framework, security in the foundation
    repo: LegionForge
    color: accent
    category: core
  - id: guardian
    name: Guardian
    short: guardian
    tagline: Deterministic security sidecar for any agent framework
    repo: guardian
    color: accent
    category: core
  - id: jeli
    name: Jeli
    short: jeli
    tagline: Security and governance layer for sovereign personal memory
    repo: jeli
    color: accent2
    category: app
    docs_path: apps/jeli
  - id: adhd-os
